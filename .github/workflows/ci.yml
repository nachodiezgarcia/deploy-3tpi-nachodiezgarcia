# =============================================================================
# CI: Lint + format check + type check en cada Pull Request a main
# =============================================================================
#
# Se dispara en cada PR contra "main" y bloquea el merge si algo falla
# (una vez activada la branch protection en Settings > Branches > main).
#
# No compila Docker ni deploya — de eso se encarga cd.yml cuando el PR ya
# está mergeado. Aquí solo queremos feedback rápido sobre calidad del código.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]

# Cancela la ejecución anterior si llegan dos pushes seguidos al mismo PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, format & type-check
    runs-on: ubuntu-latest

    # Todos los "run" se ejecutan desde la raíz del monorepo.
    defaults:
      run:
        working-directory: 03-WD/intermodular-proyect-app

    steps:
      # ── 1. Clona el repositorio ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Instala Node 22 con cache de npm ───────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 03-WD/intermodular-proyect-app/package-lock.json

      # ── 3. Instala dependencias de forma reproducible ─────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Lint (oxlint sobre todo el monorepo) ───────────────────────────
      - name: Lint
        run: npm run lint

      # ── 5. Comprobación de formato (Prettier) ─────────────────────────────
      - name: Format check
        run: npm run format:check

      # ── 6. Type check (turbo check-types genera routeTree antes) ──────────
      - name: Type check
        run: npm run check-types
